services:

  # ---------------------------------------------------------------------------
  # DATABASE (accesso diretto, non proxati da Traefik)
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - internal

  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${NEXTCLOUD_MYSQL_DATABASE}
      MYSQL_USER: ${NEXTCLOUD_MYSQL_USER}
      MYSQL_PASSWORD: ${NEXTCLOUD_MYSQL_PASSWORD}
    volumes:
      - ./mysql/data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./redis/data:/data
    ports:
      - "6379:6379"
    networks:
      - internal

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - ./qdrant/data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    networks:
      - internal

  # ---------------------------------------------------------------------------
  # AI (Ollama esposto direttamente, Open WebUI via Traefik)
  # ---------------------------------------------------------------------------

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ./ollama/data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - internal

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./open-webui/data:/app/backend/data
    depends_on:
      - ollama
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Raggiungibile su: http://ai.${DOMAIN}
      - "traefik.http.routers.open-webui.rule=Host(`ai.${DOMAIN}`)"
      - "traefik.http.routers.open-webui.entrypoints=web"
      - "traefik.http.services.open-webui.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # CLOUD
  # ---------------------------------------------------------------------------

  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    volumes:
      - ./nextcloud/data:/var/www/html
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_DB_HOST: mysql
      NEXTCLOUD_DB_NAME: ${NEXTCLOUD_MYSQL_DATABASE}
      NEXTCLOUD_DB_USER: ${NEXTCLOUD_MYSQL_USER}
      NEXTCLOUD_DB_PASSWORD: ${NEXTCLOUD_MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
      # Necessario affinché Nextcloud accetti richieste via Traefik
      NEXTCLOUD_TRUSTED_DOMAINS: nextcloud.${DOMAIN}
      OVERWRITEPROTOCOL: http
    depends_on:
      - mysql
      - redis
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Raggiungibile su: http://nextcloud.${DOMAIN}
      - "traefik.http.routers.nextcloud.rule=Host(`nextcloud.${DOMAIN}`)"
      - "traefik.http.routers.nextcloud.entrypoints=web"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------------
  # NETWORKING (Traefik stesso)
  # ---------------------------------------------------------------------------

  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      # Docker provider: scopre automaticamente i container con labels
      - "--providers.docker=true"
      # Solo i container con traefik.enable=true vengono esposti
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Dashboard raggiungibile su: http://traefik.${DOMAIN}/dashboard/
      - "traefik.http.routers.traefik.rule=Host(`traefik.${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/dashboard`))"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.service=api@internal"

  # ---------------------------------------------------------------------------
  # SICUREZZA
  # ---------------------------------------------------------------------------

  vaultwarden:
    image: vaultwarden/server
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}
    volumes:
      - ./vaultwarden/data:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Raggiungibile su: http://vaultwarden.${DOMAIN}
      - "traefik.http.routers.vaultwarden.rule=Host(`vaultwarden.${DOMAIN}`)"
      - "traefik.http.routers.vaultwarden.entrypoints=web"
      - "traefik.http.services.vaultwarden.loadbalancer.server.port=80"

  # ---------------------------------------------------------------------------
  # GESTIONE CONTAINER
  # ---------------------------------------------------------------------------

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Raggiungibile su: http://portainer.${DOMAIN}
      - "traefik.http.routers.portainer.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer.entrypoints=web"
      - "traefik.http.services.portainer.loadbalancer.server.port=9000"

  # ---------------------------------------------------------------------------
  # MONITORING
  # ---------------------------------------------------------------------------

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - ./uptime-kuma/data:/app/data
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Raggiungibile su: http://uptime.${DOMAIN}
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.${DOMAIN}`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=web"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/config:/etc/prometheus
      - ./prometheus/data:/prometheus
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Raggiungibile su: http://prometheus.${DOMAIN}
      - "traefik.http.routers.prometheus.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus.entrypoints=web"
      - "traefik.http.services.prometheus.loadbalancer.server.port=9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./grafana/data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Raggiungibile su: http://grafana.${DOMAIN}
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Raggiungibile su: http://dozzle.${DOMAIN}
      - "traefik.http.routers.dozzle.rule=Host(`dozzle.${DOMAIN}`)"
      - "traefik.http.routers.dozzle.entrypoints=web"
      - "traefik.http.services.dozzle.loadbalancer.server.port=8080"

  # ---------------------------------------------------------------------------
  # DASHBOARD
  # ---------------------------------------------------------------------------

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "*"
    volumes:
      - ./homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - internal
    labels:
      - "traefik.enable=true"
      # Homepage è la root del dominio: http://${DOMAIN}
      - "traefik.http.routers.homepage.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.homepage.entrypoints=web"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

networks:
  internal:
    driver: bridge
